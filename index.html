<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Calculator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f0f1a;
overflow:hidden;
}

/* Floating Background */

.background{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
z-index:0;
}

.number{
position:absolute;
font-weight:bold;
animation:float linear infinite;
}

@keyframes float{

0%{
transform:translateY(100vh);
opacity:0;
}

20%{opacity:1;}
80%{opacity:1;}

100%{
transform:translateY(-10vh);
opacity:0;
}

}

/* Calculator */

.calculator{
position:relative;
z-index:2;
width:330px;
padding:20px;
border-radius:15px;
background:linear-gradient(135deg,#ff6a00,#ee0979);
box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

#display{
width:100%;
height:60px;
font-size:26px;
text-align:right;
margin-bottom:15px;
padding:10px;
border:none;
border-radius:8px;
background:white;
color:black;
}

/* Buttons */

.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

button{
height:55px;
font-size:18px;
border:none;
border-radius:8px;
background:#222;
color:white;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#444;
}

button:active{
transform:scale(0.9);
}

.equals{
background:#00c853;
}

.zero{
grid-column:span 2;
}

/* Extra Panel */

.extra{
margin-top:10px;
display:none;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.extra button{
background:#37474f;
}

/* Flying Number Animation */

.flying-number{
position:absolute;
font-size:24px;
font-weight:bold;
pointer-events:none;
z-index:10;
animation:flyToDisplay 0.6s ease forwards;
}

@keyframes flyToDisplay{

0%{
transform:scale(1);
opacity:1;
}

50%{
transform:scale(1.5);
opacity:1;
}

100%{
transform:translate(var(--dx),var(--dy)) scale(0.5);
opacity:0;
}

}

</style>
</head>

<body>

<div class="background" id="background"></div>

<div class="calculator">

<input type="text" id="display" disabled>

<div class="buttons">

<button onclick="clearDisplay()">C</button>
<button onclick="deleteLast()">⌫</button>
<button onclick="append('%')">%</button>
<button onclick="append('/')">÷</button>

<button onclick="appendAnimated(event,'7')">7</button>
<button onclick="appendAnimated(event,'8')">8</button>
<button onclick="appendAnimated(event,'9')">9</button>
<button onclick="append('*')">×</button>

<button onclick="appendAnimated(event,'4')">4</button>
<button onclick="appendAnimated(event,'5')">5</button>
<button onclick="appendAnimated(event,'6')">6</button>
<button onclick="append('-')">−</button>

<button onclick="appendAnimated(event,'1')">1</button>
<button onclick="appendAnimated(event,'2')">2</button>
<button onclick="appendAnimated(event,'3')">3</button>
<button onclick="append('+')">+</button>

<button onclick="appendAnimated(event,'0')" class="zero">0</button>
<button onclick="append('.')">.</button>
<button onclick="calculate()" class="equals">=</button>

<button onclick="toggleExtra()">Other</button>

</div>

<div class="extra" id="extraPanel">

<button onclick="square()">x²</button>
<button onclick="sqrt()">√</button>
<button onclick="insertPi()">π</button>
<button onclick="power()">xʸ</button>
<button onclick="clearDisplay()">AC</button>

</div>

</div>

<script>

/* Calculator Logic */

const display=document.getElementById("display");

function append(value){
display.value+=value;
}

function clearDisplay(){
display.value="";
}

function deleteLast(){
display.value=display.value.slice(0,-1);
}

function calculate(){
try{
display.value=eval(display.value);
}
catch{
display.value="Error";
}
}

/* Flying Number Animation */

function appendAnimated(event,value){

const button=event.target;

const rectButton=button.getBoundingClientRect();
const rectDisplay=display.getBoundingClientRect();

const flying=document.createElement("div");
flying.className="flying-number";
flying.innerText=value;

flying.style.left=rectButton.left+rectButton.width/2+"px";
flying.style.top=rectButton.top+rectButton.height/2+"px";

const dx=rectDisplay.left-rectButton.left;
const dy=rectDisplay.top-rectButton.top;

flying.style.setProperty("--dx",dx+"px");
flying.style.setProperty("--dy",dy+"px");

document.body.appendChild(flying);

setTimeout(()=>{
display.value+=value;
flying.remove();
},500);

}

/* Extra Functions */

function square(){
display.value=Math.pow(eval(display.value),2);
}

function sqrt(){
display.value=Math.sqrt(eval(display.value));
}

function power(){
display.value+="**";
}

function insertPi(){
display.value+=Math.PI.toFixed(5);
}

/* Toggle Extra Panel */

function toggleExtra(){

const panel=document.getElementById("extraPanel");

if(panel.style.display==="grid")
panel.style.display="none";
else
panel.style.display="grid";

}

/* Keyboard Support */

document.addEventListener("keydown",function(e){

if(!isNaN(e.key)||"+-*/.".includes(e.key)){
append(e.key);
}

if(e.key==="Enter") calculate();

if(e.key==="Backspace") deleteLast();

});

/* Floating Numbers Background */

const bg=document.getElementById("background");

const colors=[
"#ff5252","#ffea00","#00e5ff",
"#69f0ae","#ff9100","#7c4dff",
"#ff4081","#18ffff"
];

function createNumber(){

const num=document.createElement("div");
num.classList.add("number");

num.innerText=Math.floor(Math.random()*10);

num.style.left=Math.random()*100+"vw";
num.style.fontSize=(20+Math.random()*40)+"px";

num.style.color=colors[Math.floor(Math.random()*colors.length)];

const duration=5+Math.random()*10;
num.style.animationDuration=duration+"s";

bg.appendChild(num);

setTimeout(()=>{
num.remove();
},duration*1000);

}

setInterval(createNumber,200);

</script>

</body>
</html>
